<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5efe6"/>
      <stop offset="50%" style="stop-color:#f0e6d6"/>
      <stop offset="100%" style="stop-color:#ede4d4"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feBlend in2="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.3"/>
  <!-- Decorative border -->
  <rect x="30" y="30" width="740" height="540" rx="4" fill="none" stroke="#c4a87c" stroke-width="0.5" opacity="0.5"/>
  <rect x="40" y="40" width="720" height="520" rx="2" fill="none" stroke="#c4a87c" stroke-width="0.3" opacity="0.3"/>
  <!-- Icon -->
  <text x="400" y="240" text-anchor="middle" font-size="80" fill="#c4a87c" opacity="0.6">&#127856;</text>
  <!-- Decorative line -->
  <line x1="300" y1="290" x2="500" y2="290" stroke="#c4a87c" stroke-width="0.8" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="32" fill="#5a4a3a" letter-spacing="2">Cheesecake</text>
  <!-- Subtitle -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8a7a6a" letter-spacing="3" font-style="italic">Rajnak Family Recipe</text>
  <!-- Bottom decorative line -->
  <line x1="350" y1="410" x2="450" y2="410" stroke="#c4a87c" stroke-width="0.5" opacity="0.4"/>
</svg>
